name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run check
      - run: npm run build

  rust-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - run: npm install
      - run: npm run build
      - name: Check native application
        shell: bash
        run: |
          set -o pipefail
          cargo check --manifest-path src-tauri/Cargo.toml 2>&1 | tee cargo-check.log
      - name: Upload native compile log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-check-log
          path: cargo-check.log
          if-no-files-found: warn
