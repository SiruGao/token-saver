name: Registry check

on:
  pull_request:
    paths:
      - "registry/**"
      - "scripts/validate-strategy-registry.mjs"
      - "package.json"
  push:
    branches: [main]
    paths:
      - "registry/**"
      - "scripts/validate-strategy-registry.mjs"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run registry:check
