name: Sync strategy registry

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: strategy-registry-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Query upstream releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-strategy-registry.mjs

      - name: Open or update registry review
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(registry): sync upstream strategy releases"
          branch: automation/strategy-registry
          delete-branch: true
          title: "chore(registry): sync upstream strategy releases"
          body: |
            Automated metadata-only update from the registered upstream GitHub projects.

            Review the changed versions and compatibility metadata before merging. This workflow never installs or executes third-party code.
          labels: automation,registry
          add-paths: registry/strategies.json
